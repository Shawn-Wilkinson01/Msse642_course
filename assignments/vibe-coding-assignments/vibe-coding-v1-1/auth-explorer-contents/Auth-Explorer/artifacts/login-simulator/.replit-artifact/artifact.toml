kind = "web"
previewPath = "/"
title = "Secure Login Simulator"
version = "1.0.0"
id = "artifacts/login-simulator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26120

[services.development]
run = "pnpm --filter @workspace/login-simulator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/login-simulator", "run", "build" ]
publicDir = "artifacts/login-simulator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26120"
BASE_PATH = "/"
